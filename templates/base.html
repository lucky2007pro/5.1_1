<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #dc2626;
            --border: #e5e7eb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .navbar {
            background: #0f172a;
            color: #fff;
            padding: 16px 24px;
        }
        .navbar .brand { font-weight: 700; font-size: 20px; margin-right: 24px; }
        .navbar a { color: #e2e8f0; margin-right: 14px; }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .page-header h1, .page-header h2, .page-header h3 { margin: 0; }
        .muted { color: var(--muted); }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
        }
        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }
        th { background: #f8fafc; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); text-decoration: none; }
        .btn-light { background: #fff; border-color: var(--border); color: var(--text); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { opacity: 0.92; text-decoration: none; }
        .btn-link { padding-left: 0; padding-right: 0; }
        .form {
            display: grid;
            gap: 14px;
        }
        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .field input,
        .field textarea,
        .field select {
            width: 100%;
            padding: 11px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
            font: inherit;
        }
        .field textarea { min-height: 140px; resize: vertical; }
        .empty-state {
            padding: 24px;
            border: 1px dashed #cbd5e1;
            border-radius: 14px;
            background: rgba(255,255,255,0.7);
            text-align: center;
            color: var(--muted);
        }
        .details dt { font-weight: 700; margin-top: 12px; }
        .details dd { margin: 4px 0 0; color: var(--text); }
        .footer-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background: #e0e7ff;
            color: #3730a3;
            font-size: 12px;
            font-weight: 700;
        }
        .hero {
            padding: 18px;
            border-radius: 14px;
            background: linear-gradient(135deg, #e0f2fe, #eef2ff);
            margin-bottom: 18px;
        }
        img.preview {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="brand">ERP Dashboard</span>
        <a href="{% url 'course_list' %}">Courses</a>
        <a href="{% url 'user_list' %}">Users</a>
        <a href="{% url 'category_list' %}">Categories</a>
        <a href="{% url 'course_create' %}">Add course</a>
        <a href="{% url 'user_create' %}">Add user</a>
        <a href="{% url 'category_create' %}">Add category</a>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
