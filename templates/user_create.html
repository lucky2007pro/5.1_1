{% extends "base.html" %}

{% block title %}Create user{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Create user</h1>
        <p class="muted">Add a new student and assign a course.</p>
    </div>
    <a class="btn btn-light" href="{% url 'user_list' %}">Back to users</a>
</div>

<div class="card">
    <form class="form" method="post">
        {% csrf_token %}
        <div class="field">
            <label for="id_full_name">Full name</label>
            <input id="id_full_name" type="text" name="full_name" required>
        </div>
        <div class="field">
            <label for="id_birth_date">Birth date</label>
            <input id="id_birth_date" type="date" name="birth_date" required>
        </div>
        <div class="field">
            <label for="id_start_date">Start date</label>
            <input id="id_start_date" type="date" name="start_date" required>
        </div>
        <div class="field">
            <label for="id_end_date">End date</label>
            <input id="id_end_date" type="date" name="end_date" required>
        </div>
        <div class="field">
            <label for="id_course">Course</label>
            <select id="id_course" name="course_id" required>
                <option value="">Select a course</option>
                {% for course in courses %}
                <option value="{{ course.id }}">{{ course.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="footer-actions">
            <button class="btn btn-primary" type="submit">Save user</button>
            <a class="btn btn-light" href="{% url 'user_list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
